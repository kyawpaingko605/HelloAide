name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ၁။ လမ်းကြောင်းဟောင်းများကို ဖျက်ဆီးပြီး Android Project အသစ်ကို စနစ်တကျ ပြန်ဆောက်ခြင်း
    - name: Scaffold Android Project From Scratch
      run: |
        echo "► Cleaning up old directories to avoid package conflict..."
        # ရှိပြီးသား app folder ဟောင်းကို လုံးဝ ဖျက်ပစ်ပါတယ် (package R အမှား ရှင်းစေရန်)
        rm -rf app
        
        echo "► Creating Android Project Directory Structure..."
        mkdir -p app/src/main/java/com/example/helloaide
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        echo "► Generating settings.gradle..."
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "HelloAide"
        include ':app'
        EOF

        echo "► Generating gradle.properties..."
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        EOF

        echo "► Generating root build.gradle..."
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.1.0' apply false
        }
        EOF

        echo "► Generating app/build.gradle..."
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.helloaide'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.helloaide"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        echo "► Generating AndroidManifest.xml..."
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:label="HelloAide"
                android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                <activity
                    android:name="com.example.helloaide.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        echo "► Generating activity_main.xml Layout..."
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent">
            <TextView
                android:id="@+id/hello"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:layout_centerInParent="true"
                android:textSize="24sp"
                android:text="Hello World from HelloAide!" />
        </RelativeLayout>
        EOF

        echo "► Generating MainActivity.java..."
        cat << 'EOF' > app/src/main/java/com/example/helloaide/MainActivity.java
        package com.example.helloaide;
        import android.os.Bundle;
        import android.widget.TextView;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
                
                TextView tv = findViewById(R.id.hello);
                tv.setText("Hello World from HelloAide! (Completely Cleaned & Fixed)");
            }
        }
        EOF

        echo "► Generating strings.xml..."
        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">HelloAide</string>
        </resources>
        EOF

    # ၂။ Gradle Setup ပြုလုပ်ခြင်း
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    # ၃။ Debug APK ကို Build ဆွဲခြင်း
    - name: Build Debug APK
      run: gradle assembleDebug

    # ၄။ Generated APK ကို သိမ်းဆည်းပေးခြင်း
    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: HelloAide-AutoGenerated-APK
        path: app/build/outputs/apk/debug/app-debug.apk
