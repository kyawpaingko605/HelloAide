name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # အမှားပြနေတဲ့အတွက် cache သတ်မှတ်ချက်ကို ဖြုတ်ထားပါတယ်

    # Gradle Wrapper မရှိပါက အလိုအလျောက် ဆောက်ခိုင်းခြင်း
    - name: Ensure Gradle Wrapper exists
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    # Release APK အဖြစ် Build ဆွဲခြင်း
    - name: Build Release APK
      run: ./gradlew assembleRelease

    # ထွက်လာတဲ့ APK ကို အလိုအလျောက် လက်မှတ်ထိုးခြင်း (Sign)
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    # လက်မှတ်ထိုးပြီးသား APK ကို တင်ပေးခြင်း
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: Signed-Release-APK
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
